        <svg id="musicIcon" viewBox="0 0 24 24">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
        </svg>
    </button>

    <script>
        // ===== LOADING SEQUENCE =====
        window.addEventListener('load', function () {
            setTimeout(function () {
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('invitation').classList.add('revealed');
            }, 2000);
        });

        // ===== PETALS - Appear and Disappear =====
        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            const size = 6 + Math.random() * 8;
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            petal.style.left = Math.random() * 100 + '%';
            petal.style.top = '-20px';

            // Random petal shape
            const shapes = ['50% 0 50% 0', '0 50% 0 50%', '50% 50% 0 50%', '50% 50% 50% 0'];
            petal.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];

            // Soft colors
            const colors = [
                `rgba(${210 + Math.random() * 20}, ${190 + Math.random() * 15}, ${170 + Math.random() * 15}, ${0.4 + Math.random() * 0.3})`,
                `rgba(${200 + Math.random() * 20}, ${180 + Math.random() * 15}, ${160 + Math.random() * 15}, ${0.3 + Math.random() * 0.3})`,
                `rgba(${220 + Math.random() * 15}, ${200 + Math.random() * 15}, ${180 + Math.random() * 15}, ${0.3 + Math.random() * 0.2})`,
                `rgba(${180 + Math.random() * 20}, ${200 + Math.random() * 15}, ${170 + Math.random() * 15}, ${0.3 + Math.random() * 0.2})`
            ];
            petal.style.background = colors[Math.floor(Math.random() * colors.length)];

            const duration = 6 + Math.random() * 8;
            petal.style.animation = `petalFall ${duration}s ease-in-out forwards`;

            document.querySelector('.invitation-container').appendChild(petal);
            setTimeout(() => petal.remove(), duration * 1000);
        }

        setInterval(createPetal, 1500);

        // ===== SPARKLES - Appear and Disappear =====
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = 2 + Math.random() * 4;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = (15 + Math.random() * 70) + '%';
            sparkle.style.top = (10 + Math.random() * 70) + '%';

            const colors = ['#d4af37', '#c9a96e', '#e8d5a3', '#f0e68c'];
            sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
            sparkle.style.boxShadow = `0 0 ${4 + Math.random() * 6}px ${sparkle.style.background}`;

            const duration = 1.5 + Math.random() * 2;
            sparkle.style.animation = `sparkleAppear ${duration}s ease-in-out forwards`;

            document.querySelector('.invitation-container').appendChild(sparkle);
            setTimeout(() => sparkle.remove(), duration * 1000);
        }

        setInterval(createSparkle, 800);

        // ===== FLOATING HEARTS - Appear and Disappear =====
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            const size = 8 + Math.random() * 12;
            heart.style.width = size + 'px';
            heart.style.height = size + 'px';
            heart.style.left = (20 + Math.random() * 60) + '%';
            heart.style.bottom = (20 + Math.random() * 30) + '%';

            const colors = [
                'rgba(212, 175, 55, 0.5)',
                'rgba(200, 160, 130, 0.4)',
                'rgba(180, 140, 110, 0.4)',
                'rgba(220, 190, 160, 0.3)'
            ];
            const color = colors[Math.floor(Math.random() * colors.length)];

            heart.innerHTML = `<svg viewBox="0 0 24 24" fill="${color}"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;

            const duration = 3 + Math.random() * 4;
            heart.style.animation = `heartFloat ${duration}s ease-out forwards`;

            document.querySelector('.invitation-container').appendChild(heart);
            setTimeout(() => heart.remove(), duration * 1000);
        }

        setInterval(createHeart, 3000);

        // ===== DUST PARTICLES - Appear and Disappear =====
        function createDust() {
            const dust = document.createElement('div');
            dust.className = 'dust-particle';
            const size = 1 + Math.random() * 3;
            dust.style.width = size + 'px';
            dust.style.height = size + 'px';
            dust.style.left = (10 + Math.random() * 80) + '%';
            dust.style.top = (30 + Math.random() * 50) + '%';

            const colors = [
                `rgba(212, 175, 55, ${0.3 + Math.random() * 0.4})`,
                `rgba(200, 180, 160, ${0.3 + Math.random() * 0.3})`,
                `rgba(220, 200, 180, ${0.2 + Math.random() * 0.3})`
            ];
            dust.style.background = colors[Math.floor(Math.random() * colors.length)];
            dust.style.boxShadow = `0 0 ${2 + Math.random() * 4}px ${dust.style.background}`;

            const duration = 2 + Math.random() * 3;
            dust.style.animation = `dustFloat ${duration}s ease-out forwards`;

            document.querySelector('.invitation-container').appendChild(dust);
            setTimeout(() => dust.remove(), duration * 1000);
        }

        setInterval(createDust, 600);

        // ===== MUSIC TOGGLE =====
        let isPlaying = false;
        function toggleMusic() {
            const btn = document.getElementById('musicBtn');
            const icon = document.getElementById('musicIcon');
            isPlaying = !isPlaying;

            if (isPlaying) {
                btn.classList.add('playing');
                icon.innerHTML = '<path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/><path d="M6 19l3.5-3.5" stroke="currentColor" stroke-width="2"/>';
            } else {
                btn.classList.remove('playing');
                icon.innerHTML = '<path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>';
            }
        }

        // ===== PARALLAX EFFECT =====
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;

            document.querySelectorAll('.corner-floral').forEach((el, i) => {
                const factor = (i % 2 === 0) ? 1 : -1;
                let baseTransform = '';
                if (el.classList.contains('top-right')) baseTransform = 'scaleX(-1)';
                else if (el.classList.contains('bottom-left')) baseTransform = 'scaleY(-1)';
                else if (el.classList.contains('bottom-right')) baseTransform = 'scale(-1)';

                el.style.transform = `translate(${x * factor * 0.5}px, ${y * factor * 0.5}px) ${baseTransform}`;
            });
        });

        // ===== VIDEO AUTOPLAY =====
        (function handleVideoAutoplay() {
            const video = document.getElementById('heroVideo');
            const btn = document.getElementById('videoPlayBtn');

            if (!video) return;

            const showError = () => {
                btn.style.display = 'flex';
                btn.textContent = 'تشغيل الفيديو';
            };

            const playVideo = () => {
                video.muted = false;
                video.play().then(() => {
                    btn.style.display = 'none';
                }).catch(() => {
                    showError();
                });
            };

            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    btn.style.display = 'none';
                }).catch(() => {
                    showError();
                });
            }

            btn.addEventListener('click', playVideo);

            video.addEventListener('error', () => {
                btn.style.display = 'flex';
                btn.textContent = 'خطأ في تشغيل الفيديو';
            });
        })();
    </script>
